services:

  # -- PostgreSQL ------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: scheduler_postgres
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-scheduler_db}
      POSTGRES_USER:     ${POSTGRES_USER:-scheduler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scheduler_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # init.sql roda automaticamente na 1a inicializacao do container
      - ./db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-scheduler} -d ${POSTGRES_DB:-scheduler_db}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # -- Scheduler (FastAPI + APScheduler) ------------------------------------
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scheduler_app
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Docker-outside-of-Docker (DooD):
      # Permite que o scheduler lance containers de tarefa no host Docker.
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
    init: true
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    name: scheduler_postgres_data
